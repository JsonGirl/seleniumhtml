<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selenium 自动化测试</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            padding: 24px 32px;
        }
        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 0.25rem;
            color: #2c3e50;
        }
        .sub {
            color: #5d6d7e;
            border-bottom: 1px solid #e0e4e8;
            padding-bottom: 12px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 28px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #1e4663;
            font-size: 1rem;
        }
        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .radio-group div, .checkbox-group div {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="radio"], input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        select, input[type="date"], input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ccd7e4;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.2s;
            background-color: #fff;
        }
        input[type="file"] {
            padding: 8px 14px;
            cursor: pointer;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .preview-area {
            margin-top: 12px;
            padding: 12px;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px dashed #cbd5e1;
            text-align: center;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .preview-area img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .preview-placeholder {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }
        .result-box {
            background: #f0f4f8;
            padding: 16px 20px;
            border-radius: 12px;
            margin-top: 24px;
            font-family: monospace;
            font-size: 0.9rem;
            border-left: 5px solid #3b82f6;
            word-break: break-word;
        }
        .result-box h3 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            color: #1e4663;
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            color: #7f8c8d;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✨ Selenium 测试面板</h1>
    <div class="sub">单选、多选、下拉框、日期、文本输入、文件上传（带图片预览）</div>

    <!-- 1. 单选按钮 -->
    <div class="form-group">
        <label>📌 单选按钮 (Radio Button)</label>
        <div class="radio-group">
            <div>
                <input type="radio" id="radio_red" name="color" value="红色">
                <label for="radio_red">红色</label>
            </div>
            <div>
                <input type="radio" id="radio_green" name="color" value="绿色">
                <label for="radio_green">绿色</label>
            </div>
            <div>
                <input type="radio" id="radio_blue" name="color" value="蓝色">
                <label for="radio_blue">蓝色</label>
            </div>
        </div>
    </div>

    <!-- 2. 复选框 (多选) -->
    <div class="form-group">
        <label>✅ 复选框 (Checkbox)</label>
        <div class="checkbox-group">
            <div>
                <input type="checkbox" id="check_apple" value="苹果">
                <label for="check_apple">苹果</label>
            </div>
            <div>
                <input type="checkbox" id="check_banana" value="香蕉">
                <label for="check_banana">香蕉</label>
            </div>
            <div>
                <input type="checkbox" id="check_orange" value="橙子">
                <label for="check_orange">橙子</label>
            </div>
        </div>
    </div>

    <!-- 3. 下拉框 (Select) -->
    <div class="form-group">
        <label>🔽 下拉选择框 (Select)</label>
        <select id="select_city">
            <option value="北京">北京</option>
            <option value="上海">上海</option>
            <option value="广州">广州</option>
            <option value="深圳">深圳</option>
        </select>
    </div>

    <!-- 4. 日期选择器 -->
    <div class="form-group">
        <label>📅 日期 (Date Picker)</label>
        <input type="date" id="date_picker" value="2025-01-01">
    </div>

    <!-- 5. 文本输入框 -->
    <div class="form-group">
        <label>✏️ 文本输入框 (Text Input)</label>
        <input type="text" id="text_input" placeholder="请输入任意文字..." value="Selenium 测试">
    </div>

    <!-- 6. 文件上传 + 图片预览 -->
    <div class="form-group">
        <label>📎 文件上传 (File Upload) - 支持图片预览</label>
        <input type="file" id="file_upload" accept="image/*">
        <div class="preview-area" id="previewContainer">
            <div class="preview-placeholder">📷 图片预览将显示在此处</div>
        </div>
    </div>

    <button id="showBtn">🔍 显示当前所有选择的值</button>

    <div class="result-box" id="resultArea">
        <h3>📋 当前表单值：</h3>
        <div id="resultContent">点击上方按钮查看</div>
    </div>
    <footer>
        💡 所有控件均带有固定 id，方便 Selenium 定位。<br>
        选择图片后，下方区域会自动显示缩略图。支持常见图片格式（jpg/png/gif/webp等）。
    </footer>
</div>

<script>
    // 获取文件上传控件和预览容器
    const fileInput = document.getElementById('file_upload');
    const previewContainer = document.getElementById('previewContainer');

    // 监听文件选择变化
    fileInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) {
            // 清空预览
            previewContainer.innerHTML = '<div class="preview-placeholder">📷 图片预览将显示在此处</div>';
            return;
        }

        // 检查是否为图片类型
        if (!file.type.startsWith('image/')) {
            previewContainer.innerHTML = '<div class="preview-placeholder">⚠️ 选择的文件不是图片，无法预览</div>';
            return;
        }

        // 使用 FileReader 读取并显示图片
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.createElement('img');
            img.src = e.target.result;
            img.alt = '预览图片';
            // 清空容器并添加图片
            previewContainer.innerHTML = '';
            previewContainer.appendChild(img);
        };
        reader.onerror = function() {
            previewContainer.innerHTML = '<div class="preview-placeholder">❌ 图片加载失败，请重试</div>';
        };
        reader.readAsDataURL(file);
    });

    function getCurrentValues() {
        // 获取单选选中的值
        let radioValue = "";
        const radios = document.getElementsByName("color");
        for (let radio of radios) {
            if (radio.checked) {
                radioValue = radio.value;
                break;
            }
        }

        // 获取复选框选中的值
        let checkboxValues = [];
        const checkboxes = document.querySelectorAll("input[type='checkbox']:checked");
        checkboxes.forEach(cb => checkboxValues.push(cb.value));

        // 下拉框
        const selectEl = document.getElementById("select_city");
        const selectedCity = selectEl.options[selectEl.selectedIndex]?.text || "";

        // 日期
        const dateValue = document.getElementById("date_picker").value;

        // 文本
        const textValue = document.getElementById("text_input").value;

        // 文件上传：获取文件名
        let fileNames = "";
        if (fileInput.files.length > 0) {
            fileNames = Array.from(fileInput.files).map(f => f.name).join(", ");
        } else {
            fileNames = "未选择文件";
        }

        return {
            radio: radioValue || "未选择",
            checkbox: checkboxValues.length ? checkboxValues.join(", ") : "未选择",
            select: selectedCity || "未选择",
            date: dateValue || "未填写",
            text: textValue || "未填写",
            file: fileNames
        };
    }

    function updateResultDisplay() {
        const values = getCurrentValues();
        const resultDiv = document.getElementById("resultContent");
        resultDiv.innerHTML = `
            <strong>🔘 单选：</strong> ${values.radio}<br>
            <strong>☑️ 多选：</strong> ${values.checkbox}<br>
            <strong>📋 下拉框：</strong> ${values.select}<br>
            <strong>📅 日期：</strong> ${values.date}<br>
            <strong>✏️ 文本：</strong> ${values.text}<br>
            <strong>📎 上传：</strong> ${values.file}
        `;
    }

    // 绑定按钮点击事件
    const btn = document.getElementById("showBtn");
    btn.addEventListener("click", updateResultDisplay);

    // 页面加载时显示一次默认值
    updateResultDisplay();
</script>
</body>
</html>
